<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#10b981" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#000000"/>

  <!-- Subtle ambient glow in center -->
  <ellipse cx="600" cy="300" rx="500" ry="280" fill="url(#dotGlow)" opacity="0.08"/>

  <!-- Top-left: Emerald dot with glow -->
  <circle cx="52" cy="48" r="20" fill="url(#dotGlow)" opacity="0.7"/>
  <circle cx="52" cy="48" r="6" fill="#10b981"/>

  <!-- Top-left: Brand name -->
  <text x="72" y="55" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#f5f5f7" letter-spacing="-0.5">Quant<tspan fill="#10b981">Mechanica</tspan></text>

  <!-- Center: Main headline -->
  <text x="600" y="290" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="52" font-weight="700" fill="#f5f5f7" text-anchor="middle" letter-spacing="-1.5">Systematic Strategy Discovery</text>

  <!-- Below center: Subtitle -->
  <text x="600" y="345" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="400" fill="#86868b" text-anchor="middle" letter-spacing="0.2">433 strategies built. 18,960+ Backtests. Full transparency.</text>

  <!-- Bottom-right: URL -->
  <text x="1160" y="600" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#10b981" text-anchor="end" letter-spacing="0.3">quantmechanica.com</text>

  <!-- Bottom-left: Subtle separator line -->
  <line x1="40" y1="580" x2="200" y2="580" stroke="#10b981" stroke-opacity="0.15" stroke-width="1"/>
</svg>
