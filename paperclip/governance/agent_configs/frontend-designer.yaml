# Frontend Designer / Dashboard Engineer — hire spec
# Authority: QUA-841 | CoS 2026-05-08
# Prerequisite for: M3 (Dashboard live on quantmechanica.com)
# Ordering: AFTER Framework Guardian hire. M3 is OWNER-Mittelfristig — no sprint pressure.

name: Frontend-Designer
role: engineer
reportsTo: DevOps   # agent 86015301-...

adapterConfig:
  type: claude_local
  model: claude-sonnet-4-6        # see model-decision below
  cwd: "C:/QM/repo"
  worktree: agents/frontend

runtimeConfig:
  heartbeat:
    policy: on_demand             # wake only on issue_assigned / issue_commented
    wakeOn:
      - issue_assigned
      - issue_commented

desiredSkills:
  - qm-render-dashboard           # existing — triggers internal ops dashboard regeneration
  - qm-frontend-design            # NEW skill (to be authored by CTO/DevOps before first hire activation)

# ─── SCOPE ───────────────────────────────────────────────────────────────────

responsibilities:
  - "Visual layout & brand consistency per branding/QM_BRANDING_GUIDE.md"
  - "Astro component authoring: refactor current.html + strategies.html to Astro components"
  - "Responsive design (mobile + desktop)"
  - "Public dashboard views: pipeline-phase per EA, symbol distribution, live performance, goal attainment"
  - "Maintain stable public-API contracts for public-data/*.json (process-roadmap, public-snapshot, strategy-archive)"

out_of_scope:
  - "No backend data changes"
  - "No public-API schema breakage (schema stability is a hard constraint)"
  - "No brand-token changes — OWNER-class; surface via issue only"
  - "No T6 anything"
  - "No EA code, no MQL5, no framework/ edits"

# ─── MODEL DECISION ──────────────────────────────────────────────────────────

model_decision:
  chosen: claude-sonnet-4-6
  rationale: |
    The bottleneck work mixes brand-consistency reasoning (design system judgment,
    component boundary decisions, API contract design) with Astro/HTML/CSS
    implementation. Sonnet 4.6 handles both without over-provisioning.
    Codex would be cheaper for bulk HTML refactor but introduces quality risk on
    brand adherence and API design decisions — the two areas most likely to cause
    rework. M3 is not time-critical ("OWNER-Mittelfristig"), so cost-per-task is
    less important than first-pass quality on brand and schema.
  tradeoff: |
    Codex (gpt-5-codex-mini) would cut token cost on mechanical HTML→Astro
    transforms by ~60–70 %, but cannot reliably self-audit against the brand-token
    spec or design API schemas. If scope narrows to pure component conversion in
    a later sprint, a Codex sub-agent could be spawned under the Frontend Designer.
  alternatives_rejected:
    - model: claude-opus-4-7
      reason: "Over-provisioned; no strategic reasoning required, no ambiguous multi-stakeholder trade-offs"
    - model: gpt-5-codex
      reason: "Code-only strength; brand + API design reasoning would degrade"

# ─── SKILL DECISION ──────────────────────────────────────────────────────────

skill_decision:
  extend_qm_render_dashboard: false
  create_qm_frontend_design: true
  rationale: |
    qm-render-dashboard targets Paperclip-internal ops dashboards (Python renderers
    render_dashboard.py / render_strategies.py, triggered after pipeline state changes).
    The Frontend Designer's scope is the public website (quantmechanica.com): Astro
    components, responsive layout, public-API contract maintenance — different tooling,
    different trigger context, different output surface.
    Extending qm-render-dashboard would blur the internal-ops / public-site boundary
    and create confusing WHEN-to-run semantics.
    A new qm-frontend-design skill cleanly encapsulates: Astro build commands,
    public-data schema validation, brand-token linting, and deployment to the
    quantmechanica.com static host.
  new_skill_owner: CTO   # must author qm-frontend-design before agent is activated
  blocker_for_activation: true

