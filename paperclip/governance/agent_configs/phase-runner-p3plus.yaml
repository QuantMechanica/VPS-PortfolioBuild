# Phase Runner P3+ — hire spec
# Authority: QUA-839 | CoS 2026-05-08
# Hire sequence: 2 of 4 (Prio 4.5 Pipeline-Team sub-agents)
# CEO constraint HR16: hire after P2-Baseline-Runner has closed >= 1 dispatched task

name: Phase-Runner-P3plus
role: operator
reportsTo: Pipeline-Operator   # agent 46fc11e5-7fc2-43f4-9a34-bde29e5dee3b (becomes Head of Pipeline)

adapterConfig:
  type: codex_local
  model: gpt-5.3-codex
  cwd: "C:/QM/repo"
  worktree: agents/phase-runner
  desiredSkills:
    - qm-run-pipeline-phase

runtimeConfig:
  heartbeat:
    policy: on_demand
    intervalSec: 86400          # max — Head of Pipeline routes wakes on-demand
    wakeOn:
      - issue_assigned
      - issue_commented

# ─── SCOPE ───────────────────────────────────────────────────────────────────

responsibilities:
  - "Execute P3 sweep, P4 Monte Carlo, P5b walk-forward, P6, P7 phase runners per qm-run-pipeline-phase"
  - "Receive phase dispatch assignments from Head of Pipeline via Kanban or issue"
  - "Run pre-flight checks per skill (correct phase, EA at prior-phase PASS, no parallel run)"
  - "Invoke phase runner script, monitor to completion, attach evidence report"
  - "Mark Kanban task done with evidence path; comment results on parent issue"
  - "File ONE summary recovery issue on runner crash (code 2) — do not retry silently"

out_of_scope:
  - "No P2 baseline sweeps — P2-Baseline-Runner owns that"
  - "No setfile generation — Setfile-Engineer owns that"
  - "No zero-trades recovery — Zero-Trades-Specialist owns that"
  - "No PASS/FAIL pipeline decisions — reports results; CEO + Quality-Tech decide"
  - "No T6 anything"
  - "No EA code or framework/ edits"

# ─── MODEL DECISION ──────────────────────────────────────────────────────────

model_decision:
  chosen: gpt-5.3-codex
  rationale: |
    P3–P7 phase execution is mechanical: invoke phase runner script, monitor
    progress, read output, mark done. Codex gpt-5.3 handles sequential bash
    execution and structured file reads reliably at low cost. Phase runners
    (p3_sweep.py, p4_montecarlo.py, etc.) are self-contained — no in-flight
    strategic reasoning required from the agent.
  tradeoff: |
    If a phase runner throws an unexpected error not covered by the skill's
    exit codes, Codex may stall rather than diagnose. Mitigation: skill spec
    defines board escalation on exit code 2; Head of Pipeline re-routes.
  alternatives_rejected:
    - model: claude-sonnet-4-6
      reason: "Over-provisioned for mechanical phase dispatch"
    - model: claude-haiku-4-5-20251001
      reason: "Haiku unreliable for multi-step execution with long-running phase runners"

