# Zero-Trades Specialist — hire spec
# Authority: QUA-839 | CoS 2026-05-08
# Hire sequence: 4 of 4 (Prio 4.5 Pipeline-Team sub-agents) — hire LAST
# CEO constraint HR16: hire after Setfile-Engineer has closed >= 1 dispatched task
# Note: qm-zero-trades-recovery transfers FROM CEO to this agent post-hire

name: Zero-Trades-Specialist
role: operator
reportsTo: Pipeline-Operator   # agent 46fc11e5-7fc2-43f4-9a34-bde29e5dee3b (becomes Head of Pipeline)

adapterConfig:
  type: codex_local
  model: gpt-5.3-codex
  cwd: "C:/QM/repo"
  worktree: agents/zero-trades-specialist
  desiredSkills:
    - qm-zero-trades-recovery

runtimeConfig:
  heartbeat:
    policy: on_demand
    intervalSec: 86400          # max — Head of Pipeline routes wakes on-demand
    wakeOn:
      - issue_assigned
      - issue_commented

# ─── SCOPE ───────────────────────────────────────────────────────────────────

responsibilities:
  - "Diagnose and recover EAs that produce zero-trade backtest results per qm-zero-trades-recovery"
  - "Receive zero-trades assignments from Head of Pipeline or CEO via issue"
  - "Follow skill procedure: inspect .htm file, check setfile parameters, identify root cause"
  - "Propose fix (setfile correction or setfile handoff to Setfile-Engineer)"
  - "Verify fix resolves zero-trades condition; attach evidence; mark task done"
  - "Escalate to CTO via issue if root cause is EA logic (zero-trades not a setfile problem)"

out_of_scope:
  - "No backtest execution beyond verification runs — P2-Baseline-Runner owns full sweeps"
  - "No setfile generation — Setfile-Engineer owns that"
  - "No EA code changes — CTO/Development own that"
  - "No PASS/FAIL pipeline decisions — Quality-Tech decides after fix"
  - "No T6 anything"
  - "No framework/ edits"

# ─── MODEL DECISION ──────────────────────────────────────────────────────────

model_decision:
  chosen: gpt-5.3-codex
  rationale: |
    Zero-trades recovery is structured: read .htm report, check known failure
    patterns (wrong symbol, missing data, setfile parameter out of range),
    apply documented fix procedure from qm-zero-trades-recovery. Codex gpt-5.3
    handles file inspection, pattern matching, and targeted setfile patching
    reliably. The skill defines all recovery paths explicitly.
  tradeoff: |
    If the root cause is novel (undocumented EA logic bug), Codex may
    misclassify it as a setfile problem. Mitigation: skill procedure requires
    escalation to CTO if setfile fix does not resolve within 2 attempts.
  alternatives_rejected:
    - model: claude-sonnet-4-6
      reason: "Over-provisioned; recovery procedure is fully specified in skill — no open-ended reasoning"
    - model: claude-haiku-4-5-20251001
      reason: "Haiku unreliable for multi-file inspection and conditional fix application"

