$schema: "https://json-schema.org/draft/2020-12/schema"
title: "T6 Deploy Manifest"
type: object
additionalProperties: false
required:
  - manifest_id
  - environment
  - terminal
  - approved_by
  - account
  - global_limits
  - placements
properties:
  manifest_id:
    type: string
    minLength: 1
  environment:
    type: string
    enum: [live_burn_in, live_full]
  terminal:
    type: string
    const: T6
  approved_by:
    type: string
    minLength: 1
  approved_at:
    type: ["string", "null"]
    format: date-time
  account:
    type: object
    additionalProperties: false
    required:
      - broker
      - account_type
    properties:
      broker:
        type: string
        minLength: 1
      account_type:
        type: string
        const: live
  global_limits:
    type: object
    additionalProperties: false
    required:
      - max_risk_per_trade_pct
      - daily_loss_halt_pct
      - portfolio_dd_alarm_pct
      - portfolio_dd_halt_pct
    properties:
      max_risk_per_trade_pct:
        type: number
        minimum: 0
      daily_loss_halt_pct:
        type: number
        minimum: 0
      portfolio_dd_alarm_pct:
        type: number
        minimum: 0
      portfolio_dd_halt_pct:
        type: number
        minimum: 0
  placements:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required:
        - ea_id
        - ea_file
        - symbol
        - timeframe
        - setfile
        - magic
        - risk_percent
        - source_card
      properties:
        ea_id:
          type: string
          minLength: 1
        ea_file:
          type: string
          pattern: "\\.ex5$"
        symbol:
          type: string
          minLength: 1
        timeframe:
          type: string
          minLength: 1
        setfile:
          type: string
          pattern: "\\.set$"
        magic:
          type: integer
          minimum: 1
        risk_percent:
          type: number
          minimum: 0
        source_card:
          type: string
          minLength: 1